name: freshcart
description: LB Super Market — grocery delivery app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.1
  firebase_analytics: ^11.0.1
  firebase_crashlytics: ^4.0.1
  firebase_remote_config: ^5.0.1

  # Functional error handling
  fpdart: ^1.1.0

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Image / media
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

  # Offline / local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Utilities
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  url_launcher: ^6.3.0
  razorpay_flutter: ^1.4.0
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_local_notifications: ^17.2.1
  equatable: ^2.0.5
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/bs_logo.png"
  # Logo has transparency, and some Android launchers render transparent
  # icon backgrounds oddly (or ignore them) — a solid background avoids
  # that inconsistency across different phone launchers.
  adaptive_icon_background: "#F6F8ED"
  adaptive_icon_foreground: "assets/images/bs_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/lottie/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
